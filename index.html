                                    <input type="radio" class="btn-check" name="changable" id="chan2" autocomplete="off">
                                    <label class="btn btn-outline-primary" for="chan2">ㄹ&#8594;ㄴ&#8594;ㅇ</label>
                                    
                                    <input type="radio" class="btn-check" name="changable" id="chan3" autocomplete="off">

                                        <label class="btn btn-outline-primary" for="cate3">옛말</label>
                                    </div>
                                </div>

                                            <span class="input-group-text" id="inputGroup-sizing-sm">첫글자</span>
                                            <select class="form-select">
                                                <option value="forward" id="index-head-forward" selected>앞에서</option>
                                                <option value="backward" id="index-head-backward">뒤에서</option>
                                            </select>
                                            <input type="text" class="form-control" id="index-head" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-sm" value="1">
                                        </div>
                                        
                                        <div class="input-group input-group-md mb-3 index-input-group">
                                            <span class="input-group-text" id="inputGroup-sizing-sm">끝글자</span>
                                            <select class="form-select">
                                                <option value="forward" id="index-tail-forward">앞에서</option>
                                                <option value="backward" id="index-tail-backward" selected>뒤에서</option>
                                            </select>
                                            <input type="text" class="form-control" id="index-tail" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-sm" value="1">
                                        </div>
                
                                        <div class="container" id = "index-alert"></div>
                                    </div>
                                </div>
                                <div style = "height: 20px; width: 100%"></div>
                            </div>

        <div class="search-set">
            <input type="text" class="search-box form-control center" id = "search-box" placeholder="" maxlength='1'/>

        <!--offcanvas-->

        <div class="offcanvas offcanvas-bottom" style="height: 40%" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1" id="offcanvasBottom" aria-labelledby="offcanvasBottomLabel">
            <div class="offcanvas-header" style="padding: 0; border-bottom: 1px solid rgba(0, 0, 0, 0.175)">
                <div class="btn-group menu-group" role="group" aria-label="Basic radio toggle button group">
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
                    <label class="btn btn-outline-primary wlc-menu win-menu" for="btnradio1">승리음절</label>
                
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
                    <label class="btn btn-outline-danger wlc-menu los-menu" for="btnradio2">패배음절</label>
                
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio3" autocomplete="off">
                    <label class="btn btn-outline-success wlc-menu cir-menu" for="btnradio3">순환음절</label>
                </div>
                <button type="button" class="btn-close offcanvas-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body" style="padding: 0">
                <div class="container button-area" id="win-button-area"></div>
                <div class="container button-area" id="los-button-area" style="display:none"></div>
                <div class="container button-area" id="cir-button-area" style="display:none"></div>
            </div>
        </div>
